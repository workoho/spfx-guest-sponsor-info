# git-cliff configuration
# Generates structured release notes from Conventional Commit messages.
# Used automatically by the release GitHub Actions workflow.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = ""
body = """
{% if version -%}
## What's changed in {{ version | trim_start_matches(pat="v") }}
{% else -%}
## Unreleased
{% endif -%}
{% for g in ["Features", "Bug Fixes", "Performance Improvements", "Internal Improvements", "Dependency Updates"] -%}
{% set section = commits | filter(attribute="group", value=g) -%}
{% if section | length > 0 %}
### {{ g }}
{% for commit in section -%}
- {% if commit.breaking %}💥 **Breaking:** {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endif -%}
{% endfor %}
"""
footer = """
---

### Artifacts

| File | Purpose |
|---|---|
| `guest-sponsor-info.sppkg` | SharePoint web part — upload to App Catalog |
| `guest-sponsor-info-function.zip` | Azure Function proxy — deploy via ARM template or Azure Portal |
| `guest-sponsor-info-bicep.zip` | Complete Bicep source template including parameter file and modules |
| `guest-sponsor-info-azd.zip` | Minimal azd deployment bundle with azure.yaml, Bicep files, and hooks |
| `azuredeploy.json` | ARM template for the Azure Function proxy |
| `setup-app-registration.ps1` | Creates the Entra App Registration for EasyAuth |
| `setup-graph-permissions.ps1` | Grants Graph permissions and configures silent token acquisition |

### Quick setup (PowerShell 7+, no clone required)

```powershell
# 1. Create the App Registration
{% if version -%}
& ([scriptblock]::Create((iwr 'https://raw.githubusercontent.com/workoho/spfx-guest-sponsor-info/{{ version }}/azure-function/infra/setup-app-registration.ps1').Content))
{% else -%}
& ([scriptblock]::Create((iwr 'https://raw.githubusercontent.com/workoho/spfx-guest-sponsor-info/main/azure-function/infra/setup-app-registration.ps1').Content))
{% endif %}
# 2. Deploy to Azure (use the azuredeploy.json from this release)

# 3. Grant Graph permissions
{% if version -%}
& ([scriptblock]::Create((iwr 'https://raw.githubusercontent.com/workoho/spfx-guest-sponsor-info/{{ version }}/azure-function/infra/setup-graph-permissions.ps1').Content))
{% else -%}
& ([scriptblock]::Create((iwr 'https://raw.githubusercontent.com/workoho/spfx-guest-sponsor-info/main/azure-function/infra/setup-graph-permissions.ps1').Content))
{% endif %}
```

> Full deployment guide: [docs/deployment.md](https://github.com/workoho/spfx-guest-sponsor-info/blob/main/docs/deployment.md)
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  # Developer-tooling scopes: captured as internal improvements even when
  # the type is feat/fix/perf, so they never surface as user-facing changes.
  # Covers: release scripts, CI/CD, dev container, git hooks, linting config,
  # locale files, infrastructure templates, build tooling.
  { message = "^feat", scope = "scripts|ci|infra|tooling|i18n|loc|build|release|test|types|devcontainer|husky|github|gh|config|lint|docker|deps", group = "Internal Improvements" },
  { message = "^fix",  scope = "scripts|ci|infra|tooling|i18n|loc|build|release|test|types|devcontainer|husky|github|gh|config|lint|docker|deps", group = "Internal Improvements" },
  { message = "^perf", scope = "scripts|ci|infra|tooling|i18n|loc|build|release|test|types|devcontainer|husky|github|gh|config|lint|docker|deps", group = "Internal Improvements" },
  # User-facing sections — shown first in the output above.
  { message = "^feat", group = "Features" },
  { message = "^fix",  group = "Bug Fixes" },
  { message = "^perf", group = "Performance Improvements" },
  # Code-level refactoring is interesting for contributors but not end users.
  { message = "^refactor", group = "Internal Improvements" },
  # Dependency bumps get their own section at the bottom.
  { message = "^chore\\(deps\\)", group = "Dependency Updates" },
  # Everything else (docs, style, test, chore, ci, build) is skipped.
  { message = ".*", skip = true },
]
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
