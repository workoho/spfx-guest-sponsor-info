# git-cliff configuration
# Generates structured release notes from Conventional Commit messages.
# Used automatically by the release GitHub Actions workflow.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = ""
body = """
{% if version -%}
## What's changed in {{ version | trim_start_matches(pat="v") }}
{% else -%}
## Unreleased
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits -%}
- {% if commit.breaking %}💥 **Breaking:** {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
footer = """
---

### Deployment

> For full installation details see the [README](https://github.com/jpawlowski/spfx-guest-sponsor-info#readme).

#### Web part (.sppkg)

1. Download `guest-sponsor-info.sppkg` from the assets below.
2. Upload it to your SharePoint **App Catalog**.
3. In **SharePoint Admin Center → Advanced → API access**, approve the pending
   Graph permissions (`User.Read` and `User.ReadBasic.All`).
4. Add the **Guest Sponsor Info** web part to any SharePoint Online page.

#### Guest access to web part assets

Choose one option — Option A is recommended:

- **Option A – SharePoint Public CDN** (recommended): enable the Public CDN
  with the `*/CLIENTSIDEASSETS` origin. Guest users can access static assets
  anonymously; no App Catalog permissions are needed.
- **Option B – App Catalog permissions**: enable `ShowEveryoneClaim` on the
  tenant, enable external sharing on the App Catalog site, and grant the
  **Everyone** group Read access to the App Catalog.

#### Sponsor API (optional but recommended)

Without the proxy, guests cannot load their sponsor list due to a Microsoft
restriction on delegated `User.ReadBasic.All` calls from guest accounts.

1. Download `guest-sponsor-info-function.zip` from the assets below.
2. Deploy with `azd up` or manually as a ZIP-deployed Azure Function App.
3. Configure the **Sponsor API URL** and **Client ID** in the web part property pane.
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance improvements" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^chore\\(deps\\)", group = "Dependency updates" },
  # All other types (docs, style, test, chore, ci, build) are internal
  # and not shown in release notes.
  { message = ".*", skip = true },
]
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
