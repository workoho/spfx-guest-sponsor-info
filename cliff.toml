# git-cliff configuration
# Generates structured release notes from Conventional Commit messages.
# Used automatically by the release GitHub Actions workflow.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = ""
body = """
{% if version -%}
## What's changed in {{ version | trim_start_matches(pat="v") }}
{% else -%}
## Unreleased
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits -%}
- {% if commit.breaking %}💥 **Breaking:** {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
footer = """
---

### Artifacts

| File | Purpose |
|---|---|
| `guest-sponsor-info.sppkg` | SharePoint web part — upload to App Catalog |
| `guest-sponsor-info-function.zip` | Azure Function proxy — deploy via ARM template or Azure Portal |
| `azuredeploy.json` | ARM template for the Azure Function proxy |

> First time deploying? See the [README](https://github.com/jpawlowski/spfx-guest-sponsor-info#readme) for step-by-step instructions.
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance improvements" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^chore\\(deps\\)", group = "Dependency updates" },
  # All other types (docs, style, test, chore, ci, build) are internal
  # and not shown in release notes.
  { message = ".*", skip = true },
]
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
