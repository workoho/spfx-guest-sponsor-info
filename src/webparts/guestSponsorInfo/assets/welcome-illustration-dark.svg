<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 104" fill="none">
  <!-- Parallelogram accents (Workoho brand motif) -->
  <polygon points="198,4 218,4 214,12 194,12" fill="#4FC3F7" fill-opacity="0.10"/>
  <polygon points="6,88 22,88 19,94 3,94" fill="#4FC3F7" fill-opacity="0.08"/>

  <!-- Guest: dashed circle signals external/guest status -->
  <circle cx="44" cy="52" r="32" fill="#0A3D4F" stroke="#4FC3F7" stroke-width="1.5" stroke-dasharray="5 3"/>
  <!-- Guest person: head -->
  <circle cx="44" cy="41" r="10" fill="#1A5A6A" stroke="#4FC3F7" stroke-width="1.5"/>
  <!-- Guest person: body (ellipse — unified with icon silhouette) -->
  <ellipse cx="44" cy="62" rx="14" ry="9" fill="#1A5A6A" stroke="#4FC3F7" stroke-width="1.5"/>

  <!-- Connecting fork lines -->
  <line x1="76" y1="46" x2="140" y2="26" stroke="#1A5A6A" stroke-width="2" stroke-dasharray="5 3"/>
  <line x1="76" y1="58" x2="140" y2="78" stroke="#1A5A6A" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- Sponsor 1: solid Workoho teal -->
  <circle cx="162" cy="24" r="22" fill="#12B2CD"/>
  <circle cx="162" cy="16" r="7" fill="#0D2B38"/>
  <ellipse cx="162" cy="31" rx="10" ry="6" fill="#0D2B38"/>

  <!-- Sponsor 2: solid Workoho teal -->
  <circle cx="162" cy="80" r="22" fill="#12B2CD"/>
  <circle cx="162" cy="72" r="7" fill="#0D2B38"/>
  <ellipse cx="162" cy="87" rx="10" ry="6" fill="#0D2B38"/>
</svg>
