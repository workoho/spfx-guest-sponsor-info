<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <!-- Workoho teal background -->
  <rect width="96" height="96" rx="20" fill="#12B2CD"/>

  <!-- Fork lines: two sponsors (left) converge to guest (right) -->
  <!-- The fork junction sits at ~x=46, y=48 (vertical center) -->
  <polyline points="35,24 46,48" stroke="#0A3D4F" stroke-width="2" stroke-opacity="0.45" fill="none" stroke-linecap="round"/>
  <polyline points="35,72 46,48" stroke="#0A3D4F" stroke-width="2" stroke-opacity="0.45" fill="none" stroke-linecap="round"/>
  <line x1="46" y1="48" x2="56" y2="48" stroke="#0A3D4F" stroke-width="2" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- Sponsor 1: top-left, solid dark circle -->
  <circle cx="22" cy="24" r="14" fill="#0A3D4F"/>
  <circle cx="22" cy="18.5" r="4.5" fill="white"/>
  <ellipse cx="22" cy="30" rx="6.5" ry="4" fill="white"/>

  <!-- Sponsor 2: bottom-left, solid dark circle -->
  <circle cx="22" cy="72" r="14" fill="#0A3D4F"/>
  <circle cx="22" cy="66.5" r="4.5" fill="white"/>
  <ellipse cx="22" cy="78" rx="6.5" ry="4" fill="white"/>

  <!-- Guest: right, larger dashed circle — clearly distinct from sponsors -->
  <circle cx="73" cy="48" r="18"
    fill="#0A3D4F" fill-opacity="0.15"
    stroke="#0A3D4F" stroke-width="2.5"
    stroke-dasharray="5 3"
    stroke-linecap="round"/>
  <circle cx="73" cy="42.5" r="5.5" fill="#0A3D4F"/>
  <ellipse cx="73" cy="55" rx="8" ry="4.5" fill="#0A3D4F"/>
</svg>
