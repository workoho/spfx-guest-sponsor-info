<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" fill="none">
  <!-- Privacy / Shield illustration -->

  <!-- Shield shape -->
  <path d="M40 8 L64 18 L64 42 Q64 62 40 74 Q16 62 16 42 L16 18 Z"
        fill="#12B2CD" fill-opacity="0.08" stroke="#12B2CD" stroke-width="1.5"/>

  <!-- Inner shield highlight -->
  <path d="M40 16 L56 24 L56 40 Q56 56 40 65 Q24 56 24 40 L24 24 Z"
        fill="white" stroke="#0A3D4F" stroke-width="1" opacity="0.5"/>

  <!-- Lock body -->
  <rect x="32" y="38" width="16" height="14" rx="3" fill="#0A3D4F"/>

  <!-- Lock shackle -->
  <path d="M35 38 L35 32 Q35 26 40 26 Q45 26 45 32 L45 38"
        stroke="#0A3D4F" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Keyhole -->
  <circle cx="40" cy="44" r="2.5" fill="white"/>
  <rect x="39" y="44" width="2" height="4" rx="1" fill="white"/>

  <!-- Checkmark below shield -->
  <circle cx="54" cy="60" r="7" fill="#10b981" fill-opacity="0.15"/>
  <path d="M50 60 L53 63 L58 57" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
