<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" fill="none">
  <!-- Contact panel illustration -->
  <rect x="4" y="6" width="72" height="68" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Email row -->
  <circle cx="20" cy="22" r="7" fill="#12B2CD" fill-opacity="0.15"/>
  <rect x="16" y="19.5" width="8" height="5" rx="1" fill="#12B2CD"/>
  <path d="M16.5 20 L20 22.5 L23.5 20" stroke="white" stroke-width="0.8" fill="none"/>
  <rect x="32" y="20" width="32" height="3" rx="1.5" fill="#0A3D4F" opacity="0.6"/>

  <!-- Phone row -->
  <circle cx="20" cy="38" r="7" fill="#12B2CD" fill-opacity="0.15"/>
  <rect x="17.5" y="34.5" width="5" height="7" rx="1.5" fill="#12B2CD"/>
  <rect x="18.5" y="39" width="3" height="1" rx="0.5" fill="white"/>
  <rect x="32" y="36" width="26" height="3" rx="1.5" fill="#0A3D4F" opacity="0.6"/>

  <!-- Map pin row -->
  <circle cx="20" cy="54" r="7" fill="#12B2CD" fill-opacity="0.15"/>
  <path d="M20 49 C17 49 15 51.5 15 53.5 C15 56.5 20 60 20 60 C20 60 25 56.5 25 53.5 C25 51.5 23 49 20 49Z" fill="#12B2CD"/>
  <circle cx="20" cy="53.5" r="1.5" fill="white"/>
  <rect x="32" y="52" width="20" height="3" rx="1.5" fill="#0A3D4F" opacity="0.6"/>

  <!-- Copy button hint -->
  <rect x="60" y="19" width="10" height="6" rx="2" fill="#12B2CD" fill-opacity="0.15"/>
  <rect x="62.5" y="20.5" width="3" height="3" rx="0.5" stroke="#12B2CD" stroke-width="0.8" fill="none"/>
  <rect x="63.5" y="21.5" width="3" height="3" rx="0.5" stroke="#12B2CD" stroke-width="0.8" fill="white"/>
</svg>
