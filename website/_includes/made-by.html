{%- assign strings = site.data[page.lang].strings -%}

<section class="made-by">
    <div class="container made-by-inner">
        <div class="made-by-content">
            <p class="made-by-label">{{ strings.made_by.label }}</p>
            <a href="{{ site.author_url }}?utm_source=guest-sponsor-info&amp;utm_medium=website&amp;utm_content=made-by"
                target="_blank" rel="noopener" class="made-by-logo-link">
                <img src="{{ '/assets/images/workoho-logo.svg' | relative_url }}" alt="Workoho"
                    class="made-by-workoho-logo" width="200" height="48">
            </a>
            <p class="made-by-description">{{ strings.made_by.description }}</p>
        </div>
        <div class="made-by-partner">
            <a href="https://easylife365.cloud/products/collaboration/?utm_source=guest-sponsor-info&amp;utm_medium=website&amp;utm_content=partner-badge"
                target="_blank" rel="noopener" class="partner-badge-link">
                <img src="{{ '/assets/images/easylife365-logo.svg' | relative_url }}" alt="EasyLife 365 Collaboration"
                    class="partner-logo" width="200" height="28">
                <span class="partner-tier">{{ strings.made_by.partner_tier }}</span>
            </a>
        </div>
    </div>
</section>
