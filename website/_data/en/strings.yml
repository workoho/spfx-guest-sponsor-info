problem:
  title: A guest accepted your invitation. Now what?
  body: >-
    Guests can reach your resource tenant through My Apps, a direct app
    link, or Microsoft Teams. What often still remains unclear is who
    their sponsor is, how to reach them, or what they should do next.
    This web part closes three concrete gaps.
  cta: Why?
  items:
    - title: No orientation at the entrance
      body: >-
        Depending on the invitation and app flow, guests may arrive in My
        Apps, on a direct app URL, or in Teams. Even then, the entry
        experience often offers little orientation about where they are,
        what access they just received, or what to do next.
    - title: Their sponsor is invisible
      body: >-
        Sponsors are assigned in Microsoft Entra, but guests have no
        self-service way to see them. When they need help, the only name
        they have is whoever sent the invitation email — and that might no
        longer be the right person, or even a sponsor at all.
    - title: Teams looks ready — but isn't
      body: >-
        A structured onboarding process creates the Entra account before
        adding the guest to any Teams team. Until that happens, chat and
        call actions may still be unavailable, with little built-in
        explanation for the guest.

faq:
  title: "FAQ: Microsoft Entra B2B guest access"
  lead: >-
    Short answers to the questions admins and project teams usually ask when
    they design a SharePoint guest landing page with clear sponsor visibility.
  items:
    - question: What is a sponsor in Microsoft Entra B2B?
      answer: >-
        A sponsor is the internal person or group recorded in Microsoft
        Entra's Sponsors field for a guest relationship. In Microsoft Entra
        B2B, that relationship can exist in the directory even when the guest
        has no built-in self-service way to see it.
    - question: Is an "owner" the same as a sponsor?
      answer: >-
        In some tools and internal processes, yes. There, owner usually means
        the same responsible internal contact or group that Microsoft Entra
        records as the sponsor. On this website we prefer sponsor because it
        matches Microsoft's terminology and avoids implying budget ownership or
        special authority over the guest.
    - question: Why can't a guest user see their sponsor in SharePoint by default?
      answer: >-
        SharePoint can show page content and links, but it does not surface the
        guest's Microsoft Entra sponsor relationship out of the box. Without a
        dedicated component, sponsor visibility is missing on the landing page.
    - question: What is the difference between a sponsor and the inviter?
      answer: >-
        The inviter is the person or process that triggered the invitation.
        The sponsor is the ongoing responsible contact recorded in Microsoft
        Entra. In standard Entra invitation flows, the inviter becomes the
        default sponsor unless another sponsor is specified. SharePoint
        sharing invitations can be an exception.
    - question: Why use a SharePoint guest landing page for onboarding?
      answer: >-
        A SharePoint guest landing page can serve as a stable first
        destination even in flows where Teams guest functionality is not ready
        yet. That makes it useful for showing sponsors, backup sponsors,
        contact paths, and honest onboarding status.
  more_link: Read the full sponsor vs inviter explanation

