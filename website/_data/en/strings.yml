problem:
  title: A guest accepted your invitation. Now what?
  body: >-
    Microsoft 365 provides no built-in answer to this question. Guests land
    somewhere in their own tenant with no idea who their sponsor is or what
    they can do. This web part closes three specific gaps.
  cta: Why?
  items:
    - title: No orientation at the entrance
      body: >-
        After accepting, guests land in their own organization's Teams or
        MyApps — with no indication that they now have access to your tenant.
        There is no "you've arrived" moment.
    - title: Their sponsor is invisible
      body: >-
        Sponsors are assigned in Microsoft Entra, but guests have no way to
        see them. When they need help, the only name they have is whoever sent
        the invitation email — which may no longer be the right person.
    - title: Teams looks ready — but isn't
      body: >-
        A structured onboarding process creates the Entra account before
        adding the guest to any Teams team. Until that happens, chat and call
        buttons appear on screen but do nothing. No error. No explanation.

