hero:
  title: Let your guests know who to call
  subtitle: >-
    Guest accounts provisioned through a formal process exist in Entra
    before Microsoft Teams is ready for them. This web part shows each
    guest their assigned sponsor automatically — and is honest about
    what they can and can't do yet.
  cta_primary: Explore Features
  cta_secondary: Why?
  illustration_alt: >-
    Illustration showing sponsor contact cards connecting to a guest user
  badge_languages: 17 Languages
  badge_privacy: Privacy-First
  badge_opensource: Open Source

features:
  section_title: Everything guests need — nothing they don't
  section_subtitle: >-
    Purpose-built for the moment a guest user lands in your tenant
    and needs to know who their sponsor is.
  cards:
    title: Live Sponsor Cards
    description: >-
      Rich contact cards with profile photos, job titles, email, phone,
      and office address — loaded live from Microsoft Graph, never stale.
  presence:
    title: Real-Time Teams Presence
    description: >-
      See whether a sponsor is Available, Busy, In a Meeting, or Away —
      with coloured status indicators that update automatically.
  teams:
    title: Teams Chat & Call
    description: >-
      One-click deep links to start a Teams chat or call with the sponsor.
      If Teams isn't provisioned for the guest yet, the web part shows an
      honest status instead of a button that silently fails.
  privacy:
    title: Privacy-First Architecture
    description: >-
      All data stays within your Microsoft 365 tenant. No external services,
      no tracking, no phone-home. The Azure Function proxy ensures guests
      never hold directory permissions.
  onboarding:
    title: Teams Onboarding Status
    description: >-
      Guests often accept the invitation but can't use Teams until they've
      been added to a Team. The web part detects this and shows a clear
      message with guidance — instead of leaving them with broken buttons.
  delegation:
    title: Automatic Sponsor Delegation
    description: >-
      When a primary sponsor is unavailable, the next sponsor in priority
      order steps in automatically. Disabled accounts and shared mailboxes
      are filtered out.

features_page:
  subtitle: >-
    Purpose-built for the moment a B2B guest user lands in your tenant
    and needs to know who their sponsor is.
  cards:
    title: Live Sponsor Cards
    description: >-
      Rich contact cards show the guest's assigned sponsors with live
      profile photos, display name, job title, email, phone number, and
      office address — all loaded directly from Microsoft Graph. No stale
      data, no manual maintenance.
    highlights:
      - "Three layout modes: Full, Compact, and Auto"
      - Live profile photos from Microsoft Graph
      - Office address with optional map integration
  contact_panel:
    title: Rich Contact Details
    description: >-
      Hovering or tabbing to a card opens a contact panel with everything
      a guest needs — email, work phone, mobile, office location, and
      full address. Each field has a one-click copy button. The panel also
      shows the sponsor's manager and reporting chain.
    highlights:
      - One-click copy for email, phone, and mobile
      - Inline map preview via Azure Maps
      - Manager name, title, and department
      - Every field individually toggleable by admins
  onboarding:
    title: Teams Onboarding Status
    description: >-
      A guest account can exist in Entra before it has been added to any
      Team. In this state, guests see working-looking buttons that actually
      do nothing. The web part detects this and shows a clear message
      explaining the situation — with guidance to contact their sponsor.
      Chat and call buttons are disabled until Teams access is confirmed.
  presence:
    title: Real-Time Teams Presence
    description: >-
      Coloured presence indicators show whether a sponsor is reachable
      right now. Updates automatically with intelligent polling intervals.
    statuses:
      - Available
      - Busy
      - In a Meeting
      - Away
      - Out of Office
      - Do Not Disturb
      - Focusing
      - Offline
  teams:
    title: Teams Chat & Call Integration
    description: >-
      One-click deep links let guests start a Teams chat or call directly
      from the sponsor card. The web part detects when Teams hasn't been
      provisioned for a guest yet and shows a helpful explanation instead
      of a broken link.
  privacy:
    title: Privacy-First Architecture
    description: >-
      All data stays within your Microsoft 365 and Azure tenant. The web
      part makes no external calls, sends no telemetry to third parties,
      and stores nothing outside the browser session. The Azure Function
      proxy ensures guests never need directory-level permissions.
    link: Read the Privacy Policy
  delegation:
    title: Automatic Sponsor Delegation
    description: >-
      When multiple sponsors are assigned in priority order, the web part
      skips unavailable sponsors automatically. Disabled accounts, shared
      mailboxes, and deleted users are filtered out — guests always see
      active, reachable contacts.
    detail: >-
      Sponsors are evaluated in the configured priority order — primary
      first, then secondary, and so on. Each sponsor is checked for
      account status, mailbox type, and presence. The first active,
      reachable sponsor is shown to the guest. If none qualify, the last
      valid entry is displayed with a reduced contact set.
  more:
    title: And there's more
    languages:
      title: 17 Languages
      description: >-
        English, German, French, Spanish, Italian, Danish, Finnish,
        Japanese, Norwegian, Swedish, Chinese, Portuguese, Polish,
        Dutch, Czech, Hungarian, and Romanian — including formal and
        informal modes.
    api:
      title: Zero-Trust Security
      description: >-
        Guests authenticate with their own identity but never hold directory
        permissions. EasyAuth validates every request before it reaches the
        function; the Managed Identity handles all Graph calls on their behalf.
    editor:
      title: Editor Preview Mode
      description: >-
        Page editors see realistic demo cards with mock data — no Graph
        calls, no guest account required. Design the landing page before
        any guests have been invited.
    resilience:
      title: Built-in Resilience
      description: >-
        Handles Microsoft Graph throttling and transient failures without
        showing errors to guests. Progressive loading keeps something visible
        at all times; the web part recovers automatically.
    permissions:
      title: Try Before You Commit
      description: >-
        Demo Mode lets you place the web part on a page and see it working —
        with realistic mock sponsor cards — before setting up any Azure
        infrastructure. No API, no guests, no commitment required.
    guest_only:
      title: Silent for Internal Users
      description: >-
        The web part renders nothing for internal member accounts — no Graph
        calls, no visible component. Only B2B guests see the sponsor cards.
        Page editors see a compact preview instead of the full interface.

