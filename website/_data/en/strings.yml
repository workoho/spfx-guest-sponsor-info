  home: Home
  features: Features
  aria_label: Main navigation
  toggle: Toggle menu
  switch_lang: Zur deutschen Version wechseln

hero:
  title: Let your guests know who to call
  subtitle: >-
    A SharePoint Framework web part that shows B2B guest users their
    assigned Microsoft Entra sponsors — live contact cards with photos,
    Teams presence, and one-click communication.
  cta_primary: Download Latest Release
  cta_secondary: Explore Features
  illustration_alt: >-
    Illustration showing sponsor contact cards connecting to a guest user
  badge_languages: 14 Languages
  badge_privacy: Privacy-First
  badge_opensource: Open Source

features:
  section_title: Everything guests need — nothing they don't
  section_subtitle: >-
    Purpose-built for the moment a guest user lands in your tenant
    and needs to know who their contact is.
  cards:
    title: Live Sponsor Cards
    description: >-
      Rich contact cards with profile photos, job titles, email, phone,
      and office address — loaded live from Microsoft Graph, never stale.
  presence:
    title: Real-Time Teams Presence
    description: >-
      See whether a sponsor is Available, Busy, In a Meeting, or Away —
      with coloured status indicators that update automatically.
  teams:
    title: Teams Chat & Call
    description: >-
      One-click deep links to start a Teams chat or call with the sponsor,
      with built-in detection for "Teams not provisioned yet" states.
  privacy:
    title: Privacy-First Architecture
    description: >-
      All data stays in your Microsoft 365 tenant. No external services,
      no tracking, no data leaves your boundary. Period.
  multilingual:
    title: 14 Languages Built In
    description: >-
      English, German, French, Spanish, Italian, Danish, Finnish, Japanese,
      Norwegian, Swedish, Chinese, Portuguese, Polish, and Dutch — including
      formal and informal modes.
  delegation:
    title: Automatic Sponsor Delegation
    description: >-
      When a primary sponsor is unavailable, the next sponsor in priority
      order steps in automatically. Disabled accounts and shared mailboxes
      are filtered out.

made_by:
  label: Created & maintained by
  description: >-
    Workoho builds tools for Microsoft 365 collaboration and identity
