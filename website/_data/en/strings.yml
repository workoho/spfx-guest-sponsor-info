problem:
  title: A guest accepted your invitation. Now what?
  body: >-
    The standard Microsoft 365 guest experience answers none of the questions
    a new guest actually has. This web part closes three gaps at once.
  cta: Why?
  items:
    - title: No orientation at the entrance
      body: >-
        After accepting, guests land in their own organization's Teams or
        MyApps — with no signal they're now inside your tenant. There's no
        "you've arrived" moment at all.
    - title: Their contact is invisible
      body: >-
        Sponsors are assigned in Microsoft Entra, but guests never see them.
        By the time they need help, the invitation email names whoever clicked
        "Invite" — which may not be the right person today.
    - title: Teams looks ready — but isn't
      body: >-
        A proper governance process creates the Entra account before adding
        guests to any Team. Until that step happens, chat and call buttons are
        silently broken. Guests get no explanation.

