hero:
  title: Let your guests know who to call
  subtitle: >-
    A SharePoint guest landing page is often the safest first destination for
    Microsoft Entra B2B guest users after they accept an invitation — but
    out of the box it still cannot show them who their sponsors are.
    Guest Sponsor Info puts sponsors, backup sponsors, and contact paths
    directly on that page — and is honest about what they can and can't
    do yet.
  cta_primary: Explore Features
  cta_secondary: Why?
  illustration_alt: >-
    Illustration showing sponsor contact cards connecting to a guest user
  badge_languages: 17 Languages
  badge_privacy: Privacy-First
  badge_opensource: Open Source

features:
  section_title: Everything guests need — nothing they don't
  section_subtitle: >-
    Built for the moment a Microsoft Entra B2B guest lands in your tenant
    and needs sponsor visibility for the first time: who their sponsors
    are, who the backup sponsors are, and how to reach them.
  cards:
    title: Live Sponsor Cards
    description: >-
      The core feature: guests can finally see their assigned sponsors
      and backup sponsors — with profile photos, job titles, email,
      phone, and office address.
  presence:
    title: Real-Time Teams Presence
    description: >-
      See whether a sponsor is Available, Busy, In a Meeting, or Away,
      with coloured status indicators that update automatically.
  teams:
    title: Teams Chat & Call
    description: >-
      One-click deep links for a Teams chat or call with the sponsor.
      If Teams isn't provisioned for the guest yet, the web part shows an
      honest status instead of a button that looks ready but is not.
  privacy:
    title: Privacy-First Architecture
    description: >-
      Sponsor and guest data stays inside your Microsoft 365 and Azure
      environment. Workoho receives no runtime data, analytics, or
      phone-home stream. The Azure Function proxy ensures guests never
      hold directory permissions.
  onboarding:
    title: Teams Onboarding Status
    description: >-
      Guests often accept the invitation but still can't use Teams until
      they've been added to a Team. The web part detects this and shows a
      clear explanation instead of leaving them with broken buttons.
  delegation:
    title: Automatic Sponsor Delegation
    description: >-
      When a primary sponsor is unavailable, the next sponsor in priority
      order steps in automatically. Disabled accounts and shared mailboxes
      are filtered out.

features_page:
  subtitle: >-
    Built for the moment a Microsoft Entra B2B guest lands on your
    SharePoint guest landing page and needs sponsor visibility
    immediately — not just the name of whoever invited them.
  cards:
    title: Live Sponsor Cards
    description: >-
      Rich contact cards give Microsoft Entra B2B guests direct sponsor
      visibility on the SharePoint landing page: live profile photos,
      display name, job title, email, phone number, and office address —
      sourced from Microsoft Graph through the companion Azure Function
      proxy. Current directory data, no manual upkeep.
    highlights:
      - "Three layout modes: Full, Compact, and Auto"
      - Live profile photos from Microsoft Graph
      - Office address with optional map integration
  contact_panel:
    title: Rich Contact Details
    description: >-
      Hovering or tabbing to a card opens a contact panel with the details
      a guest actually needs — email, work phone, mobile, office location,
      and full address. Each field has a one-click copy button. The panel
      can also show the sponsor's manager for extra orientation when Teams
      is not yet available.
    highlights:
      - One-click copy for email, phone, and mobile
      - Inline map preview via Azure Maps
      - Manager name, title, and department
      - Every field individually toggleable by admins
  onboarding:
    title: Teams Onboarding Status
    description: >-
      A guest account can exist in Entra before it has been added to any
      Team. In real onboarding flows, that leaves guests on a SharePoint
      landing page with contact actions that look ready but are not. The
      web part detects this, shows a clear explanation, and disables chat
      and call buttons until Teams access is confirmed.
  presence:
    title: Real-Time Teams Presence
    description: >-
      Coloured presence indicators show whether a sponsor is reachable
      right now. Updates automatically with intelligent polling.
    statuses:
      - Available
      - Busy
      - In a Meeting
      - Away
      - Out of Office
      - Do Not Disturb
      - Focusing
      - Offline
  teams:
    title: Teams Chat & Call Integration
    description: >-
      One-click deep links let guests start a Teams chat or call directly
      from the sponsor card. If Teams is not provisioned yet, the web part
      shows an explanation instead of a broken link.
  privacy:
    title: Privacy-First Architecture
    description: >-
      Sponsor and guest data stays inside your Microsoft 365 and Azure
      environment. The solution sends no runtime data to Workoho, requires
      no Workoho-operated backend, and keeps directory access inside your
      tenant. The Azure Function proxy ensures guests never need
      directory-level permissions.
    link: Read the Privacy Policy
  delegation:
    title: Automatic Sponsor Delegation
    description: >-
      When multiple sponsors are assigned in priority order, the web part
      lets the next eligible sponsor step in automatically. Disabled
      accounts, shared mailboxes, resource accounts, and deleted users are
      filtered out of the active contact set.
    detail: >-
      Sponsors are evaluated in configured priority order — primary first,
      then secondary, and so on. Account status, mailbox type,
      resource-account status, and sponsor eligibility filters determine who
      can appear as a full contact. Eligible sponsors fill the visible
      slots, while unavailable sponsors can remain as read-only context.
      That gives the guest more trust than seeing only the original inviter
      and nobody else.
  more:
    title: More features
    languages:
      title: 17 Languages
      description: >-
        English, German, French, Spanish, Italian, Danish, Finnish,
        Japanese, Norwegian, Swedish, Chinese, Portuguese, Polish,
        Dutch, Czech, Hungarian, and Romanian — including formal and
        informal modes.
    api:
      title: Zero-Trust Security
      description: >-
        Guests authenticate with their own identity but never hold directory
        permissions. EasyAuth validates each request before it reaches the
        function, and the Managed Identity handles all Graph calls on their
        behalf.
    editor:
      title: Editor Preview Mode
      description: >-
        Page editors see realistic demo cards with mock data — no Graph
        calls and no guest account required. Design the landing page before
        any guests are invited.
    resilience:
      title: Built-in Resilience
      description: >-
        Handles Microsoft Graph throttling and transient failures without
        showing errors to guests. Progressive loading keeps something
        visible, and the web part recovers automatically.
    permissions:
      title: Try Before You Commit
      description: >-
        Demo Mode lets you place the web part on a page and see it working
        with realistic mock sponsor cards before you set up any Azure
        infrastructure. No API, no guests, no commitment required.
    guest_only:
      title: Silent for Internal Users
      description: >-
        The web part renders nothing for internal member accounts — no Graph
        calls and no visible component. Only B2B guests see the sponsor
        cards. Page editors see a compact preview instead of the full
        interface.

