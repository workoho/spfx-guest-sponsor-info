  partner_cta: Demo buchen

problem:
  title: Ein Gast hat Ihre Einladung angenommen. Und jetzt?
  body: >-
    Microsoft 365 gibt darauf keine Antwort. Gäste landen irgendwo in ihrem
    eigenen Tenant — ohne zu wissen, wer ihr Sponsor ist oder was sie
    überhaupt tun können. Dieses Web Part schließt drei konkrete Lücken.
  cta: Warum?
  items:
    - title: Keine Orientierung am Eingang
      body: >-
        Nach der Annahme landen Gäste im Teams oder in den MyApps ihrer
        eigenen Organisation — ohne jeden Hinweis, dass sie jetzt auch
        Zugang zu Ihrem Tenant haben. Es gibt keinen „Willkommen"-Moment.
    - title: Ihr Sponsor ist unsichtbar
      body: >-
        Sponsoren sind in Microsoft Entra hinterlegt, aber Gäste haben keine
        Möglichkeit, sie einzusehen. Wenn sie Hilfe brauchen, kennen sie nur
        den Namen auf der Einladungs-E-Mail — der heute vielleicht nicht mehr
        der richtige Ansprechpartner ist.
    - title: Teams scheint bereit — ist es aber nicht
      body: >-
        Ein geregelter Onboarding-Prozess legt das Entra-Konto an, bevor
        der Gast einem Teams-Team hinzugefügt wird. Bis dieser Schritt
        erfolgt, erscheinen Chat- und Anruf-Buttons auf dem Bildschirm,
        tun aber nichts. Kein Fehler. Keine Erklärung.

