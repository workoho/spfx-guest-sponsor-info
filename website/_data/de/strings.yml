meta:
  description: >-
    Guest Sponsor Info — ein kostenloses SharePoint Framework Web Part
    für Microsoft Entra B2B-Gastbenutzer, das Sponsoren,
    Ersatz-Sponsoren, Live-Kontaktkarten, Teams-Präsenz und 17 Sprachen
    auf eine SharePoint-Seite bringt.

