  toc_title: Auf dieser Seite
  toc_label: Inhaltsverzeichnis
  view_on_github: Vollständige Dokumentation auf GitHub ansehen

hero:
  title: Zeigen Sie Ihren Gästen, wen sie kontaktieren können
  subtitle: >-
    Gastkonten, die über einen formalen Prozess angelegt werden, existieren
    in Entra, bevor Microsoft Teams für sie bereit ist. Dieses Web Part
    zeigt jedem Gast automatisch seinen zugewiesenen Sponsor — und sagt
    ehrlich, was bereits möglich ist und was noch nicht.
  cta_primary: Features entdecken
  cta_secondary: Warum?
  illustration_alt: >-
    Illustration mit Sponsor-Kontaktkarten, die sich mit einem Gastbenutzer verbinden
  badge_languages: 17 Sprachen
  badge_privacy: Privacy-First
  badge_opensource: Open Source

features:
  section_title: Alles was Gäste brauchen — nicht mehr
  section_subtitle: >-
    Entwickelt für den Moment, in dem ein Gastbenutzer in Ihrem
    Tenant landet und wissen muss, wer sein Sponsor ist.
  cards:
    title: Live-Sponsor-Karten
    description: >-
      Kontaktkarten mit Profilfotos, Jobtiteln, E-Mail, Telefon und
      Büroadresse — live aus Microsoft Graph geladen, nie veraltet.
  presence:
    title: Echtzeit-Teams-Präsenz
    description: >-
      Sehen Sie, ob ein Sponsor verfügbar, beschäftigt, in einer
      Besprechung oder abwesend ist — mit farbigen Statusanzeigen,
      die sich automatisch aktualisieren.
  teams:
    title: Teams-Chat & -Anruf
    description: >-
      Ein-Klick-Deeplinks für Teams-Chat oder -Anruf mit dem Sponsor.
      Wenn Teams für den Gast noch nicht bereitgestellt wurde, zeigt das
      Web Part eine ehrliche Statusmeldung statt eines defekten Buttons.
  privacy:
    title: Privacy-First-Architektur
    description: >-
      Alle Daten bleiben in Ihrem Microsoft 365 Tenant. Keine externen
      Dienste, kein Tracking, kein Phone-Home. Der Azure Function Proxy
      stellt sicher, dass Gäste keinerlei Verzeichnisberechtigungen benötigen.
  onboarding:
    title: Teams-Onboarding-Status
    description: >-
      Gäste nehmen die Einladung an, können Teams aber erst nutzen,
      wenn sie einem Team hinzugefügt wurden. Das Web Part erkennt das
      und zeigt eine klare Meldung mit Handlungsempfehlung — statt
      funktionsloser Buttons.
  delegation:
    title: Automatische Sponsor-Delegation
    description: >-
      Wenn ein primärer Sponsor nicht verfügbar ist, übernimmt
      automatisch der nächste in der Prioritätsreihenfolge.
      Deaktivierte Konten und geteilte Postfächer werden ausgefiltert.

features_page:
  subtitle: >-
    Entwickelt für den Moment, in dem ein B2B-Gastbenutzer in Ihrem
    Tenant landet und wissen muss, wer sein Sponsor ist.
  cards:
    title: Live-Sponsor-Karten
    description: >-
      Kontaktkarten zeigen die zugewiesenen Sponsoren mit Live-Profilfotos,
      Anzeigenamen, Jobtitel, E-Mail, Telefonnummer und Büroadresse —
      alles direkt aus Microsoft Graph geladen. Keine veralteten Daten,
      keine manuelle Pflege.
    highlights:
      - "Drei Layout-Modi: Vollständig, Kompakt und Auto"
      - Live-Profilfotos aus Microsoft Graph
      - Büroadresse mit optionaler Kartenintegration
  contact_panel:
    title: Umfangreiche Kontaktdetails
    description: >-
      Beim Überfahren oder Fokussieren einer Karte öffnet sich ein
      Kontaktpanel mit allem, was ein Gast braucht — E-Mail, Telefon,
      Mobilnummer, Bürostandort und vollständige Adresse. Jedes Feld
      hat einen Kopieren-Button. Das Panel zeigt auch den Vorgesetzten
      und die Berichtskette des Sponsors.
    highlights:
      - Ein-Klick-Kopieren für E-Mail, Telefon und Mobil
      - Inline-Kartenvorschau über Azure Maps
      - Name, Titel und Abteilung des Vorgesetzten
      - Jedes Feld einzeln durch Admins ein-/ausschaltbar
  onboarding:
    title: Teams-Onboarding-Status
    description: >-
      Ein Gastkonto kann in Entra existieren, bevor es einem Team
      hinzugefügt wurde. In diesem Zustand sehen Gäste funktional
      aussehende Buttons, die nichts tun. Das Web Part erkennt das und
      zeigt eine klare Meldung mit Handlungsempfehlung — Chat- und
      Anruf-Buttons werden deaktiviert, bis der Teams-Zugang bestätigt ist.
  presence:
    title: Echtzeit-Teams-Präsenz
    description: >-
      Farbige Präsenz-Indikatoren zeigen, ob ein Sponsor gerade
      erreichbar ist. Automatische Aktualisierung mit intelligenten
      Abfrageintervallen.
    statuses:
      - Verfügbar
      - Beschäftigt
      - In einer Besprechung
      - Abwesend
      - Nicht im Büro
      - Nicht stören
      - Fokussiert
      - Offline
  teams:
    title: Teams-Chat & -Anruf-Integration
    description: >-
      Ein-Klick-Deeplinks ermöglichen es Gästen, direkt aus der
      Sponsor-Karte einen Teams-Chat oder -Anruf zu starten. Das Web Part
      erkennt, wenn Teams für einen Gast noch nicht bereitgestellt wurde,
      und zeigt stattdessen eine hilfreiche Erklärung an.
  privacy:
    title: Privacy-First-Architektur
    description: >-
      Alle Daten bleiben innerhalb Ihres Microsoft 365 und Azure Tenants.
      Keine externen Aufrufe, keine Telemetrie an Dritte, keine Speicherung
      außerhalb der Browser-Sitzung. Der Azure Function Proxy stellt sicher,
      dass Gäste nie Verzeichnis-Berechtigungen benötigen.
    link: Zur Datenschutzrichtlinie
  delegation:
    title: Automatische Sponsor-Delegation
    description: >-
      Wenn mehrere Sponsoren in Prioritätsreihenfolge zugewiesen sind,
      überspringt das Web Part nicht verfügbare automatisch. Deaktivierte
      Konten, geteilte Postfächer und gelöschte Benutzer werden
      ausgefiltert — Gäste sehen immer aktive, erreichbare Kontakte.
    detail: >-
      Sponsoren werden in der konfigurierten Prioritätsreihenfolge
      geprüft — zuerst der primäre, dann der sekundäre usw. Jeder
      Sponsor wird auf Kontostatus, Postfachtyp und Präsenz
      überprüft. Der erste aktive, erreichbare Sponsor wird dem Gast
      angezeigt. Wenn keiner qualifiziert ist, wird der letzte
      gültige Eintrag mit reduziertem Kontaktumfang dargestellt.
  more:
    title: Und es gibt noch mehr
    languages:
      title: 17 Sprachen
      description: >-
        Englisch, Deutsch, Französisch, Spanisch, Italienisch, Dänisch,
        Finnisch, Japanisch, Norwegisch, Schwedisch, Chinesisch,
        Portugiesisch, Polnisch, Niederländisch, Tschechisch, Ungarisch
        und Rumänisch — inkl. Du/Sie-Modus.
    api:
      title: Zero-Trust-Sicherheit
      description: >-
        Gäste authentifizieren sich mit ihrer eigenen Identität, erhalten
        aber keinerlei Verzeichnisberechtigungen. EasyAuth prüft jede Anfrage
        vor der Function; die Managed Identity übernimmt alle Graph-Aufrufe.
    editor:
      title: Vorschaumodus für Editoren
      description: >-
        Seitenbearbeiter sehen realistische Demo-Karten mit Beispieldaten
        — keine Graph-Aufrufe, kein Gastkonto erforderlich. Gestalten Sie
        das Layout bevor Gäste eingeladen wurden.
    resilience:
      title: Eingebaute Resilienz
      description: >-
        Graph-Drosselung und vorübergehende Fehler werden lautlos
        verarbeitet — Gäste sehen keine Fehlermeldungen. Progressives
        Laden hält immer etwas sichtbar; das Web Part erholt sich automatisch.
    permissions:
      title: Testen ohne Verpflichtung
      description: >-
        Der Demo-Modus zeigt das Web Part mit realistischen Beispiel-Sponsorkarten
        — ganz ohne Azure-Infrastruktur. Kein API, kein Gast, kein Setup
        erforderlich. Ideal zum Ausprobieren vor dem eigentlichen Rollout.
    guest_only:
      title: Unsichtbar für interne Benutzer
      description: >-
        Das Web Part rendert für interne Mitglieder-Konten absolut nichts —
        keine Graph-Aufrufe, kein sichtbares Element. Nur B2B-Gäste sehen
        die Sponsorkarten. Seitenbearbeiter sehen einen kompakten Vorschaumodus.

