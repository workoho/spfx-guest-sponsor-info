hero:
  title: Zeigen Sie Ihren Gästen, wen sie kontaktieren können
  subtitle: >-
    Eine SharePoint-Gast-Landingpage ist oft der verlässlichste erste Zielort
    für Microsoft Entra B2B-Gastbenutzer nach Annahme einer Einladung —
    aber mit Bordmitteln kann sie ihnen trotzdem nicht zeigen, wer ihre
    Sponsoren sind. Guest Sponsor Info bringt Sponsoren,
    Ersatz-Sponsoren und Kontaktwege direkt auf diese Seite — und sagt
    ehrlich, was bereits möglich ist und was noch nicht.
  cta_primary: Features entdecken
  cta_secondary: Warum?
  illustration_alt: >-
    Illustration mit Sponsor-Kontaktkarten, die sich mit einem Gastbenutzer verbinden
  badge_languages: 17 Sprachen
  badge_privacy: Privacy-First
  badge_opensource: Open Source

features:
  section_title: Alles, was Gäste brauchen — nicht mehr
  section_subtitle: >-
    Entwickelt für den Moment, in dem ein Microsoft Entra
    B2B-Gastbenutzer in Ihrem Tenant landet und zum ersten Mal
    Sponsor-Sichtbarkeit braucht: wer seine Sponsoren sind, wer die
    Ersatz-Sponsoren sind und wie er sie erreicht.
  cards:
    title: Live-Sponsor-Karten
    description: >-
      Die Kernfunktion: Gäste können ihre zugewiesenen Sponsoren und
      Ersatz-Sponsoren endlich sehen — mit Profilfoto, Jobtitel, E-Mail,
      Telefon und Büroadresse.
  presence:
    title: Echtzeit-Teams-Präsenz
    description: >-
      Sehen Sie, ob ein Sponsor verfügbar, beschäftigt, in einer
      Besprechung oder abwesend ist, mit farbigen Statusanzeigen, die
      sich automatisch aktualisieren.
  teams:
    title: Teams-Chat & -Anruf
    description: >-
      Ein-Klick-Deeplinks für Teams-Chat oder -Anruf mit dem Sponsor.
      Wenn Teams für den Gast noch nicht bereitgestellt wurde, zeigt das
      Web Part eine ehrliche Statusmeldung statt eines Buttons, der
      bereit aussieht, es aber nicht ist.
  privacy:
    title: Privacy-First-Architektur
    description: >-
      Sponsor- und Gastdaten bleiben in Ihrer Microsoft-365- und
      Azure-Umgebung. Workoho erhält keine Laufzeitdaten, Analytics oder
      Phone-Home-Datenströme. Der Azure Function Proxy stellt sicher,
      dass Gäste keinerlei Verzeichnisberechtigungen benötigen.
  onboarding:
    title: Teams-Onboarding-Status
    description: >-
      Gäste nehmen die Einladung oft an, können Teams aber erst nutzen,
      wenn sie einem Team hinzugefügt wurden. Das Web Part erkennt das
      und zeigt eine klare Erklärung statt funktionsloser Buttons.
  delegation:
    title: Automatische Sponsor-Delegation
    description: >-
      Wenn ein primärer Sponsor nicht verfügbar ist, übernimmt
      automatisch der nächste in der Prioritätsreihenfolge.
      Deaktivierte Konten und geteilte Postfächer werden ausgefiltert.

features_page:
  subtitle: >-
    Entwickelt für den Moment, in dem ein Microsoft Entra
    B2B-Gastbenutzer auf Ihrer SharePoint-Gast-Landingpage landet und
    sofort Sponsor-Sichtbarkeit braucht — und nicht nur den Namen der
    Person, die ihn eingeladen hat.
  cards:
    title: Live-Sponsor-Karten
    description: >-
      Kontaktkarten geben Microsoft Entra B2B-Gastbenutzern direkte
      Sponsor-Sichtbarkeit auf der SharePoint-Landingpage: mit
      Live-Profilfotos, Anzeigenamen, Jobtitel, E-Mail, Telefonnummer und
      Büroadresse — bezogen aus Microsoft Graph über den begleitenden
      Azure-Function-Proxy. Aktuelle Verzeichnisdaten, keine manuelle
      Pflege.
    highlights:
      - "Drei Layout-Modi: Vollständig, Kompakt und Auto"
      - Live-Profilfotos aus Microsoft Graph
      - Büroadresse mit optionaler Kartenintegration
  contact_panel:
    title: Umfangreiche Kontaktdetails
    description: >-
      Beim Überfahren oder Fokussieren einer Karte öffnet sich ein
      Kontaktpanel mit den Details, die ein Gast tatsächlich braucht —
      E-Mail, Telefon, Mobilnummer, Bürostandort und vollständige
      Adresse. Jedes Feld hat einen Kopieren-Button. Optional zeigt das
      Panel auch den Vorgesetzten des Sponsors und gibt so zusätzliche
      Orientierung, wenn Teams noch nicht verfügbar ist.
    highlights:
      - Ein-Klick-Kopieren für E-Mail, Telefon und Mobil
      - Inline-Kartenvorschau über Azure Maps
      - Name, Titel und Abteilung des Vorgesetzten
      - Jedes Feld einzeln durch Admins ein-/ausschaltbar
  onboarding:
    title: Teams-Onboarding-Status
    description: >-
      Ein Gastkonto kann in Entra existieren, bevor es einem Team
      hinzugefügt wurde. In realen Gäste-Onboarding-Prozessen führt das
      oft dazu, dass Gäste auf einer SharePoint-Landingpage
      Kontaktaktionen sehen, die bereit aussehen, aber noch nicht nutzbar
      sind. Das Web Part erkennt das, zeigt eine klare Erklärung und
      deaktiviert Chat- und Anruf-Buttons, bis der Teams-Zugang bestätigt
      ist.
  presence:
    title: Echtzeit-Teams-Präsenz
    description: >-
      Farbige Präsenz-Indikatoren zeigen, ob ein Sponsor gerade
      erreichbar ist. Automatische Aktualisierung mit intelligentem
      Polling.
    statuses:
      - Verfügbar
      - Beschäftigt
      - In einer Besprechung
      - Abwesend
      - Nicht im Büro
      - Nicht stören
      - Fokussiert
      - Offline
  teams:
    title: Teams-Chat & -Anruf-Integration
    description: >-
      Ein-Klick-Deeplinks ermöglichen es Gästen, direkt aus der
      Sponsor-Karte einen Teams-Chat oder -Anruf zu starten. Wenn Teams
      für einen Gast noch nicht bereitgestellt wurde, zeigt das Web Part
      stattdessen eine hilfreiche Erklärung an.
  privacy:
    title: Privacy-First-Architektur
    description: >-
      Sponsor- und Gastdaten bleiben innerhalb Ihrer Microsoft-365- und
      Azure-Umgebung. Die Lösung sendet keine Laufzeitdaten an Workoho,
      benötigt kein Workoho-betriebenes Backend und hält den
      Verzeichniszugriff vollständig in Ihrem Tenant. Der Azure Function
      Proxy stellt sicher, dass Gäste nie Verzeichnisberechtigungen
      benötigen.
    link: Zur Datenschutzrichtlinie
  delegation:
    title: Automatische Sponsor-Delegation
    description: >-
      Wenn mehrere Sponsoren in Prioritätsreihenfolge zugewiesen sind,
      lässt das Web Part automatisch den nächsten geeigneten Sponsor
      nachrücken. Deaktivierte Konten, geteilte Postfächer,
      Ressourcen-Konten und gelöschte Benutzer werden aus dem aktiven
      Kontaktset herausgefiltert.
    detail: >-
      Sponsoren werden in konfigurierter Prioritätsreihenfolge geprüft —
      zuerst der primäre, dann der sekundäre usw. Kontostatus,
      Postfachtyp, Ressourcen-Konto-Status und Sponsor-Filter
      entscheiden darüber, wer als vollständiger Kontakt erscheinen kann.
      Geeignete Sponsoren füllen die sichtbaren Plätze, während nicht
      verfügbare Sponsoren als schreibgeschützter Kontext sichtbar bleiben
      können. Das schafft mehr Vertrauen, als wenn der Gast nur den
      ursprünglichen Einladenden kennt und sonst niemanden.
  more:
    title: Weitere Funktionen
    languages:
      title: 17 Sprachen
      description: >-
        Englisch, Deutsch, Französisch, Spanisch, Italienisch, Dänisch,
        Finnisch, Japanisch, Norwegisch, Schwedisch, Chinesisch,
        Portugiesisch, Polnisch, Niederländisch, Tschechisch, Ungarisch
        und Rumänisch — inkl. Du/Sie-Modus.
    api:
      title: Zero-Trust-Sicherheit
      description: >-
        Gäste authentifizieren sich mit ihrer eigenen Identität, erhalten
        aber keinerlei Verzeichnisberechtigungen. EasyAuth prüft jede
        Anfrage vor der Function, und die Managed Identity übernimmt alle
        Graph-Aufrufe.
    editor:
      title: Vorschaumodus für Editoren
      description: >-
        Seitenbearbeiter sehen realistische Demo-Karten mit Beispieldaten
        — keine Graph-Aufrufe und kein Gastkonto erforderlich. Gestalten
        Sie das Layout, bevor Gäste eingeladen wurden.
    resilience:
      title: Eingebaute Resilienz
      description: >-
        Graph-Drosselung und vorübergehende Fehler werden lautlos
        verarbeitet — Gäste sehen keine Fehlermeldungen. Progressives
        Laden hält etwas sichtbar, und das Web Part erholt sich
        automatisch.
    permissions:
      title: Testen ohne Verpflichtung
      description: >-
        Der Demo-Modus zeigt das Web Part mit realistischen
        Beispiel-Sponsorkarten — ganz ohne Azure-Infrastruktur. Kein API,
        kein Gast, kein Setup erforderlich. Ideal zum Ausprobieren vor dem
        eigentlichen Rollout.
    guest_only:
      title: Unsichtbar für interne Benutzer
      description: >-
        Das Web Part rendert für interne Mitglieder-Konten nichts — keine
        Graph-Aufrufe und kein sichtbares Element. Nur B2B-Gäste sehen die
        Sponsorkarten. Seitenbearbeiter sehen einen kompakten Vorschaumodus.

