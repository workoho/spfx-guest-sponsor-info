problem:
  title: Ein Gast hat Ihre Einladung angenommen. Und jetzt?
  body: >-
    Gäste können Ihren Ressourcentenant über My Apps, einen Direktlink oder
    Microsoft Teams erreichen. Was dabei oft trotzdem unklar bleibt, ist,
    wer ihr Sponsor ist, wie sie ihn erreichen oder was sie als Nächstes
    tun sollen. Dieses Web Part schließt drei konkrete Lücken.
  cta: Warum?
  items:
    - title: Keine Orientierung am Eingang
      body: >-
        Je nach Einladungs- und App-Flow landen Gäste in My Apps, auf einer
        Direkt-URL oder in Teams. Selbst dann fehlt am Einstieg oft die
        Orientierung: Wo bin ich gerade, worauf habe ich jetzt Zugriff und
        was ist der nächste sinnvolle Schritt?
    - title: Ihr Sponsor ist unsichtbar
      body: >-
        Sponsoren sind in Microsoft Entra hinterlegt, aber Gäste haben keine
        Self-Service-Möglichkeit, sie einzusehen. Wenn sie Hilfe brauchen,
        kennen sie nur den Namen aus der Einladungs-E-Mail — der heute
        vielleicht nicht mehr der richtige Ansprechpartner ist oder gar kein
        Sponsor ist.
    - title: Teams scheint bereit — ist es aber nicht
      body: >-
        Ein geregelter Onboarding-Prozess legt das Entra-Konto an, bevor
        der Gast einem Teams-Team hinzugefügt wird. Bis dieser Schritt
        erfolgt, können Chat- und Anruf-Aktionen weiter fehlen, ohne dass
        der Gast dafür eine eingebaute Erklärung sieht.

faq:
  title: "FAQ: Microsoft Entra B2B-Gastzugriff"
  lead: >-
    Kurze Antworten auf die Fragen, die Admins und Projektteams typischerweise
    stellen, wenn sie eine SharePoint-Gast-Landingpage mit klarer
    Sponsor-Sichtbarkeit aufbauen.
  items:
    - question: Was ist ein Sponsor in Microsoft Entra B2B?
      answer: >-
        Ein Sponsor ist die interne Person oder Gruppe, die im Sponsors-Feld
        von Microsoft Entra für eine Gastbeziehung eingetragen ist. Diese
        Beziehung kann in Microsoft Entra B2B bereits hinterlegt sein, auch
        wenn der Gast sie selbst noch nirgends sehen kann.
    - question: Ist mit „Owner“ dasselbe gemeint wie mit Sponsor?
      answer: >-
        In manchen Tools und internen Prozessen ja. Dort meint Owner meist
        denselben zuständigen internen Kontakt oder dieselbe Gruppe, die
        Microsoft Entra als Sponsor hinterlegt. Auf dieser Website bevorzugen
        wir Sponsor, weil das der Microsoft-Begriff ist und nicht nach Budget-
        Verantwortung oder besonderer Weisungsbefugnis gegenüber dem Gast
        klingt.
    - question: Warum kann ein Gast seinen Sponsor in SharePoint nicht einfach sehen?
      answer: >-
        SharePoint kann Seiteninhalte und Links anzeigen, blendet die
        Sponsor-Beziehung aus Microsoft Entra aber nicht automatisch ein.
        Ohne eine dedizierte Komponente fehlt diese Sponsor-Sichtbarkeit auf
        der Landingpage.
    - question: Was ist der Unterschied zwischen Sponsor und Einladendem?
      answer: >-
        Der Einladende ist die Person oder der Prozess, der die Einladung
        ausgelöst hat. Der Sponsor ist der laufend zuständige Kontakt, der in
        Microsoft Entra hinterlegt ist. In standardmäßigen Entra-
        Einladungsflüssen wird der Einladende zum Standard-Sponsor, sofern
        kein anderer Sponsor angegeben wird. SharePoint-Freigaben können eine
        Ausnahme sein.
    - question: Warum eignet sich eine SharePoint-Gast-Landingpage für das Onboarding?
      answer: >-
        Eine SharePoint-Gast-Landingpage kann auch dann schon ein stabiler
        erster Zielort sein, wenn die Teams-Gastfunktionen noch nicht bereit
        sind. Damit eignet sie sich für Sponsoren, Ersatz-Sponsoren,
        Kontaktwege und einen ehrlichen Onboarding-Status.
  more_link: Vollständige Erklärung zu Sponsor vs. Einladender lesen

