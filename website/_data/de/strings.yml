meta:
  description: >-
    Guest Sponsor Info — ein kostenloses SharePoint Framework Web Part,
    das Microsoft Entra Sponsoren für B2B-Gastbenutzer anzeigt, mit
    Live-Kontaktkarten, Teams-Präsenz und 17 Sprachen.

