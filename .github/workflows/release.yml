name: Release

# Triggered by SemVer tags, e.g. v1.2.3
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# The GITHUB_TOKEN needs write access to create the release and upload assets.
permissions:
  contents: write

jobs:
  # ── Job 1: verify the code is green before touching any release artefact ──
  test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Compiles TypeScript, runs ESLint, bundles with webpack, and runs Jest.
      - name: Build and test
        run: npm test

  # ── Job 2: package and publish – only runs when job 1 is green ────────────
  release:
    name: Package & publish .sppkg
    runs-on: ubuntu-latest
    needs: test
    env:
      # Opt into Node.js 24 for action runners now, ahead of the June 2026 forced
      # migration. Silences deprecation warnings from actions that still ship a
      # Node 20 runtime (setup-bicep, action-gh-release) until they release updates.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # Full git history required by git-cliff

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          # Pin to the major version required by the engines field in package.json.
          node-version: "22"
          cache: "npm"

      # Extract the semver string from the tag (strip the leading "v").
      - name: Extract version
        id: ver
        run: echo "semver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Generate structured release notes from Conventional Commit history.
      # The script reads GIT_CLIFF_VERSION from scripts/release-notes.sh and
      # auto-installs the git-cliff binary on first run — no separate action needed.
      - name: Generate release notes
        run: ./scripts/release-notes.sh --latest > RELEASE_NOTES.md

      # Stamp the version into package.json and config/package-solution.json.
      - name: Stamp version
        run: ./scripts/set-version.sh "${{ github.ref_name }}"

      # Full production build: npm ci → compile/bundle/test → package .sppkg
      - name: Build and package
        run: ./scripts/build.sh

      # Build the Azure Function ZIP package.
      - name: Build Azure Function package
        working-directory: azure-function
        run: |
          npm ci
          npm run package

      - name: Set up Bicep
        uses: anthony-c-martin/setup-bicep@0f6b30d69264f211ac1229412a2ad4ed893c272f # v0.3

      # Compile the Bicep infra template to ARM JSON for the Deploy-to-Azure button.
      # Normally set-version.sh already does this locally before tagging, so the
      # committed azuredeploy.json should already be up to date. This step is a
      # self-healing safety net for tags created directly on GitHub (bypassing the
      # script). If the file is stale: regenerate, commit to main, move the tag to
      # the new commit, and exit — the new tag push will trigger a fresh run.
      - name: Ensure azuredeploy.json is up to date (safety net)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bicep build azure-function/infra/main.bicep --outfile "$RUNNER_TEMP/azuredeploy-fresh.json"

          if diff -q "$RUNNER_TEMP/azuredeploy-fresh.json" azure-function/infra/azuredeploy.json > /dev/null 2>&1; then
            echo "azuredeploy.json is already up to date — no action needed."
          else
            echo "azuredeploy.json is stale — regenerating, committing, and moving tag."
            cp "$RUNNER_TEMP/azuredeploy-fresh.json" azure-function/infra/azuredeploy.json
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add azure-function/infra/azuredeploy.json
            git commit -m "chore(ci): update azuredeploy.json for ${{ github.ref_name }} [skip ci]"
            git tag -f "${{ github.ref_name }}" -m "Release ${{ github.ref_name }}"
            git push origin HEAD:main
            git push origin --force "${{ github.ref_name }}"
            echo "Tag moved to new commit. A fresh workflow run will be triggered."
            exit 0
          fi

      # Create or update the GitHub Release and attach build artifacts.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.ver.outputs.semver }}
          body_path: RELEASE_NOTES.md
          files: |
            sharepoint/solution/guest-sponsor-info.sppkg
            azure-function/guest-sponsor-info-function.zip
            azure-function/infra/azuredeploy.json
            azure-function/infra/main.bicep
            azure-function/infra/setup-app-registration.ps1
            azure-function/infra/setup-graph-permissions.ps1
            azure-function/infra/Write-Callout.ps1
