name: Release

# Triggered by SemVer tags, e.g. v1.2.3
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# The GITHUB_TOKEN needs write access to create the release and upload assets.
permissions:
  contents: write

# Each tag is unique, so cancellation is not needed.
# The group guard still prevents two releases from running in parallel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Single job: validate, build, package, and publish in one pass.
  # build.sh already compiles, bundles, tests, and packages — no separate
  # test job needed. Running everything once avoids a double npm ci + double
  # test execution that the previous two-job layout produced.
  release:
    name: Build, package & publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # Full git history required by git-cliff

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Pin to the major version required by the engines field in package.json.
          node-version: "22"
          cache: "npm"

      # Extract the semver string from the tag (strip the leading "v").
      - name: Extract version
        id: ver
        run: echo "semver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Generate structured release notes from Conventional Commit history.
      # The script reads GIT_CLIFF_VERSION from scripts/release-notes.sh and
      # auto-installs the git-cliff binary on first run — no separate action needed.
      - name: Generate release notes
        env:
          FORCE_COLOR_IN_CI: "1"
        run: ./scripts/release-notes.sh --latest > RELEASE_NOTES.md

      # Stamp the version into package.json and config/package-solution.json.
      - name: Stamp version
        env:
          FORCE_COLOR_IN_CI: "1"
        run: ./scripts/set-version.sh "${{ github.ref_name }}"

      # Full production build: npm ci × 2 (web part + function), compile,
      # bundle, test, and package .sppkg. Tests run here — no separate job needed.
      - name: Build and package
        env:
          FORCE_COLOR_IN_CI: "1"
        run: ./scripts/build.sh

      # build.sh already ran npm ci + build for the Azure Function.
      # Only the ZIP packaging step needs to run here.
      - name: Package Azure Function as ZIP
        working-directory: azure-function
        run: npm run package

      # Bundle only the Bicep template sources and their modules.
      # azd hooks live under infra/hooks via azure.yaml and are intentionally
      # excluded from this archive because they are not part of the Bicep file graph.
      - name: Package Bicep template as ZIP
        run: |
          rm -f azure-function/guest-sponsor-info-bicep.zip
          cd azure-function/infra
          zip -r ../guest-sponsor-info-bicep.zip main.bicep main.parameters.json modules

      # Bundle the minimal azd deployment sources: azure.yaml, the Bicep template,
      # and the pre/post-provision hooks referenced by azure.yaml.
      - name: Package azd deployment bundle as ZIP
        run: |
          rm -f guest-sponsor-info-azd.zip
          zip -r guest-sponsor-info-azd.zip \
            azure.yaml \
            azure-function/infra/main.bicep \
            azure-function/infra/main.parameters.json \
            azure-function/infra/modules \
            azure-function/infra/hooks

      # Compile the Bicep infra template to ARM JSON for the Deploy-to-Azure button.
      # Uses the Azure CLI (pre-installed on GitHub runners) instead of the
      # third-party anthony-c-martin/setup-bicep action — az bicep is maintained
      # directly by Microsoft and needs no separate setup step.
      # Normally set-version.sh already does this locally before tagging, so the
      # committed azuredeploy.json should already be up to date. This step is a
      # self-healing safety net for tags created directly on GitHub (bypassing the
      # script). If the file is stale: regenerate, commit to main, move the tag to
      # the new commit, and exit — the new tag push will trigger a fresh run.
      - name: Ensure azuredeploy.json is up to date (safety net)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          az bicep install
          az bicep build --file azure-function/infra/main.bicep --outfile "$RUNNER_TEMP/azuredeploy-fresh.json"

          if diff -q "$RUNNER_TEMP/azuredeploy-fresh.json" azure-function/infra/azuredeploy.json > /dev/null 2>&1; then
            echo "azuredeploy.json is already up to date — no action needed."
          else
            echo "azuredeploy.json is stale — regenerating, committing, and moving tag."
            cp "$RUNNER_TEMP/azuredeploy-fresh.json" azure-function/infra/azuredeploy.json
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add azure-function/infra/azuredeploy.json
            git commit -m "chore(ci): update azuredeploy.json for ${{ github.ref_name }} [skip ci]"
            git tag -f "${{ github.ref_name }}" -m "Release ${{ github.ref_name }}"
            git push origin HEAD:main
            git push origin --force "${{ github.ref_name }}"
            echo "Tag moved to new commit. A fresh workflow run will be triggered."
            exit 0
          fi

      # Create or update the GitHub Release and attach build artifacts.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.ver.outputs.semver }}
          body_path: RELEASE_NOTES.md
          files: |
            sharepoint/solution/guest-sponsor-info.sppkg
            azure-function/guest-sponsor-info-function.zip
            azure-function/guest-sponsor-info-bicep.zip
            guest-sponsor-info-azd.zip
            azure-function/infra/azuredeploy.json
            azure-function/infra/setup-app-registration.ps1
            azure-function/infra/setup-graph-permissions.ps1
