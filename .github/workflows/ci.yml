name: CI

# Run a build check on every push to main and on all pull requests targeting main.
# No packaging step – this is intentionally fast.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel any in-progress run for the same branch or PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Compiles TypeScript, runs ESLint, bundles with webpack, and runs Jest.
      # Coverage is written to jest-output/coverage/.
      - name: Build and test
        run: npm test

      # Upload the jest coverage report so it can be viewed in the GitHub Actions summary.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jest-coverage
          path: jest-output/coverage/
          retention-days: 14
