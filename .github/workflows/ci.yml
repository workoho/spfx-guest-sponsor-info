name: CI

# Run a build check on every push to main and on all pull requests targeting main.
# No packaging step – this is intentionally fast.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Compiles TypeScript, runs ESLint, bundles with webpack, and runs Jest.
      # Coverage is written to jest-output/coverage/.
      - name: Build and test
        run: npm test

      # Upload the jest coverage report so it can be viewed in the GitHub Actions summary.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: jest-coverage
          path: jest-output/coverage/
          retention-days: 14
