# Setup steps that GitHub Copilot's coding agent runs before starting work.
# This file is NOT a devcontainer — it runs in a GitHub Actions sandbox.
# See: https://docs.github.com/en/copilot/how-tos/agents/copilot-coding-agent/customizing-the-development-environment-for-copilot-coding-agent
name: "Copilot Setup Steps"

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          # Stay within the range declared in package.json `engines`.
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Install Yeoman and the SPFx generator globally so the agent can
      # scaffold a new web part from scratch if needed (e.g. blueprint use).
      # Versions are derived from package.json config for a single source of truth.
      - name: Install Yeoman and SPFx generator
        run: |
          SPFX_VERSION="$(node -p "require('./package.json').config?.spfxVersion || require('./package.json').dependencies['@microsoft/sp-core-library']")"
          YO_VERSION="$(node -p "require('./package.json').config?.yoVersion || '7.0.0'")"
          npm install --global "yo@${YO_VERSION}" "@microsoft/generator-sharepoint@${SPFX_VERSION}"
