version: 2

updates:
  # ── npm dependencies ──────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group all tooling updates into a single PR to reduce noise.
    groups:
      tooling:
        patterns:
          - "@commitlint/*"
          - "eslint*"
          - "eslint-*"
          - "husky"
          - "markdownlint-cli2"
          - "stylelint"
          - "stylelint-*"
          - "typescript"
    ignore:
      # The @microsoft/sp-* and @microsoft/spfx-* packages form a tightly
      # coupled SPFx suite. They must all be upgraded together and only
      # intentionally — not by automated PRs.
      - dependency-name: "@microsoft/sp-*"
      - dependency-name: "@microsoft/spfx-*"
      - dependency-name: "@microsoft/eslint-*"
      # @rushstack packages are part of the SPFx Heft build rig and are
      # coordinated with the SPFx release.
      - dependency-name: "@rushstack/*"
      # SPFx ships with React 17 internally; a version mismatch causes subtle
      # build errors. Upgrade only alongside a full SPFx upgrade.
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "@types/react"
      - dependency-name: "@types/react-dom"
      # @fluentui/react is tightly coupled to the SPFx Fluent UI version.
      - dependency-name: "@fluentui/react"

  # ── npm dependencies (Azure Function) ────────────────────────────────────
  - package-ecosystem: npm
    directory: /azure-function
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # @types/node major upgrades require a coordinated change across multiple
      # files (engines.node in package.json, WEBSITE_NODE_DEFAULT_VERSION in
      # main.bicep/azuredeploy.json, and the Azure Function runtime setting).
      # Block major bumps here and do Node runtime upgrades fully manually.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      actions-core:
        patterns:
          - "actions/*"
      actions-release:
        patterns:
          - "softprops/action-gh-release"
          - "anthony-c-martin/setup-bicep"
