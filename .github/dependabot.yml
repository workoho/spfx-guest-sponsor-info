version: 2

updates:
  # ── npm dependencies ──────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group all tooling updates into a single PR to reduce noise.
    groups:
      tooling:
        patterns:
          - "@commitlint/*"
          - "@typescript-eslint/*"
          - "eslint*"
          - "eslint-*"
          - "husky"
          - "lint-staged"
          - "markdownlint-cli2"
          - "stylelint"
          - "stylelint-*"
          - "typescript"
      # Keep all Fluent UI v9 packages in sync in a single PR.
      fluentui:
        patterns:
          - "@fluentui/*"
    ignore:
      # The @microsoft/sp-* and @microsoft/spfx-* packages form a tightly
      # coupled SPFx suite. They must all be upgraded together and only
      # intentionally — not by automated PRs.
      - dependency-name: "@microsoft/sp-*"
      - dependency-name: "@microsoft/spfx-*"
      - dependency-name: "@microsoft/eslint-*"
      # @rushstack packages are part of the SPFx Heft build rig and are
      # coordinated with the SPFx release.
      - dependency-name: "@rushstack/*"
      # @types/heft-jest is tightly coupled to the Heft build rig.
      - dependency-name: "@types/heft-jest"
      # css-loader is pinned to the version compatible with the SPFx webpack
      # configuration. Major bumps require manual verification.
      - dependency-name: "css-loader"
        update-types: ["version-update:semver-major"]
      # typescript in the webpart is constrained by the SPFx build rig, which
      # ships TypeScript 5.x as a direct dependency (@microsoft/spfx-web-build-rig).
      # Major version upgrades (e.g. 5.x → 6.x) would break the Heft compilation
      # pipeline. Only patch/minor updates within the current major are safe.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # SPFx ships with React 17 internally; a version mismatch causes subtle
      # build errors. Upgrade only alongside a full SPFx upgrade.
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "@types/react"
      - dependency-name: "@types/react-dom"

  # ── npm dependencies (Azure Function) ────────────────────────────────────
  - package-ecosystem: npm
    directory: /azure-function
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # @types/node major upgrades require a coordinated change across multiple
      # files (engines.node in package.json, WEBSITE_NODE_DEFAULT_VERSION in
      # main.bicep, and the Azure Function runtime setting).
      # Block major bumps here and do Node runtime upgrades fully manually.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # ── Bundler dependencies (Jekyll website) ──────────────────────────────────
  - package-ecosystem: bundler
    directory: /website
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      actions-core:
        patterns:
          - "actions/*"
          - "ruby/*"
      actions-release:
        patterns:
          - "softprops/action-gh-release"
          - "anthony-c-martin/setup-bicep"
