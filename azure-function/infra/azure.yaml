# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

# Standalone azure.yaml for use with the guest-sponsor-info-infra.zip release package.
# When azd is run from the extracted infra directory, all paths are relative to this file.
#
# For development use from the repository root, see azure.yaml at the root of the
# repository — that file uses the full azure-function/infra/ path prefix.

name: guest-sponsor-info

infra:
  provider: bicep
  path: .

hooks:
  # Derives a default Function App name from the azd environment name,
  # detects the SharePoint tenant name, and checks Azure RBAC and Entra
  # role assignments required for the Bicep Graph extension deployment.
  # Must run before Bicep so all required env vars are set.
  preprovision:
    posix:
      shell: sh
      run: hooks/pre-provision.sh
      interactive: true
    windows:
      shell: pwsh
      run: hooks/pre-provision.ps1
      interactive: true

  # Restarts the Function App so the newly assigned Graph permissions
  # (provisioned by Bicep) are picked up immediately by the Managed Identity
  # token cache. Prints the web part configuration values.
  postprovision:
    posix:
      shell: sh
      run: hooks/post-provision.sh
    windows:
      shell: pwsh
      run: hooks/post-provision.ps1
